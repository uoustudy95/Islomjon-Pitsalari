<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial=1.0">
        <meta name="description" content="Alvin's Pizzeria">
        <meta name="keywords" content="pizza restaurants, pizza rear me">
        <meta name="outhor" content="Kalman Web design">
        <title>Islomjon Pizzeria Order</title>
        <!--google front-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
        <!--stylesheet-->
        <link href="./styles/styles.css" rel="stylesheet">
        <!--fontawesome-->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="scripts/scripts.js"></script>
    </head>

    <body>
        <!--overlar for mobile-->
        <div id="overlay">
            <div>
              <i class="fa fa-times" title="button to close mobile navigation" onclick="off()"></i>
            </div>
         <div class="overlay-text">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="about.html">About</a>
                <a href="order.html" class="order-nav">Order</a>
         </div>
        </div>
    
        <header>
            <nav class="nav full-nav">
                <div>
                    <img src="./images/alvins_pizza_resturant_logo.png" alt="alvins logo" style="width: 25%;">
                </div>
                <div>
                    <a href="index.html">Home</a>
                    <a href="menu.html">Menu</a>
                    <a href="about.html">About</a>
                    <a href="order.html" class="order-nav">Order</a>
                </div>
            </nav>

            <!--mobile-->
            <nav class="nav mobile-nav">
                <div>
                    <img src="./images/alvins_pizza_resturant_logo.png" alt="alvins logo" style="width: 25%;">
                </div>
                <div>
                    <i class="fa-solid fa-bars" title="button to open navigation" onclick="on()"></i>
                </div>
            </nav>
        </header>

        <main>
        <div class="red-spacer"></div>

        <!-- form -->
        <div>
            <h1>Order</h1>
            <div class="order">
                <form>
                    <div class="form1">
                        <div>
                            <h3>Islom Pizzala</h3>
                            <h3>Toshkent, Yunusobod, 3000 st</h3>
                            <div>
                                <input type="radio" id="pickup" name="pick" value="1">
                                <label for="pickup">Pickup</label>
                            </div>
                            <div>
                                <input type="radio" id="dine-in" name="pick" value="1">
                                <label for="dine-in">Dine-in</label>
                            </div>
                        </div>
                        <div>
                            <h3>Order Details</h3>
                        </div>
                    </div>
                    <hr class="form-hr">
                    <div class="form-input">
                        <h3>Info</h3>
                        <div>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" placeholder="name">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" placeholder="example123@gmail.com">
                            <label for="phone">Phone number:</label>
                            <input type="tel" id="phone" name="phone" pattern="[0-9]{2}-[0-9]{3}-[0-9]{2}-[0-9]{2}"
                                placeholder="12-345-67-89">
                        </div>

                    </div>
                    <hr class="form-hr">
                    <div class="form-input">
                        <h3>Payment</h3>
                        <div>
                            <label for="cardname">Carholder Name:</label>
                            <input type="text" id="cardname" name="cardname" placeholder="name">
                            <label for="address">Cardholder Address</label>
                            <input type="text" id="address" name="address" placeholder="example123@gmail.com">
                            <label for="card">Card number:</label>
                            <input type="number" id="card" name="card" placeholder="1234 5678 9011 1213">
                            <label for="cvv">CVV:</label>
                            <input type="number" id="cvv" name="cvv" placeholder="123">
                        </div>
                    </div>
                    <div class="form-btn">
                        <button type="reset" value="Reset">Cancel</button>
                        <button type="submit" value="Submit">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

        <!--footer-->
        <footer>
            <div>
                <img src="./images/alvins_pizza_resturant_logo.png" alt="alvins logo" style="width: 10%;" loading="lazy">
            </div>
            <div>
                <div>
                    <a href="index.html">Home</a>
                    <a href="menu.html">Menu</a>
                    <a href="about.html">About</a>
                    <a href="order.html">Order</a>
                </div>
                <div>
                    <h4>Copyright 2026 Alvin's Pizzeria</h4>
                </div>
            </div>
            <div>
                <img src="./images/alvins_instagram.png" alt="alvins instagram logo" style="width: 10%;" loading="lazy">
                <img src="./images/Alvins_facebook.png" alt="alvins facebook logo" style="width: 10%;" loading="lazy">
            </div>
        </footer>
    </body>

</html>
